<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--bg2:#0c1020;--surface:#111827;--surface2:#1a2035;
  --border:rgba(99,179,255,0.1);--border2:rgba(99,179,255,0.2);
  --accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
  --text:#f0f4ff;--muted:#7e8fb0;--muted2:#a8b4cc;
  --success:#34d399;--warn:#fbbf24;--danger:#f87171;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-top:52px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
input,textarea,select{font-family:var(--font);color:var(--text);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:var(--surface2);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

.vlx-nav{position:fixed;top:0;left:0;right:0;z-index:99999;padding:0 28px;height:52px;background:rgba(6,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(99,179,255,0.12);display:flex;align-items:center;justify-content:space-between;gap:16px;font-family:'Space Grotesk',system-ui,sans-serif;}
.vlx-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.vlx-nav-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;}
.vlx-nav-logo-text{font-weight:700;font-size:15px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.vlx-nav-links{display:flex;align-items:center;gap:4px;list-style:none;margin:0;padding:0;flex:1;justify-content:center;}
.vlx-nav-links a{color:rgba(168,180,204,0.85);font-size:13px;text-decoration:none;padding:5px 12px;border-radius:7px;border:1px solid transparent;transition:all 0.18s;white-space:nowrap;}
.vlx-nav-links a:hover{color:#f0f4ff;background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.18);}
.vlx-nav-links a.vlx-active{color:#60a5fa;background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.25);}
.vlx-nav-cta{background:linear-gradient(135deg,#3b82f6,#8b5cf6)!important;color:#fff!important;border:none!important;font-weight:600!important;padding:7px 16px!important;border-radius:8px!important;}
@media(max-width:640px){.vlx-nav-links{display:none;}.vlx-nav{padding:0 16px;}}
</style>
</head>

<nav class="vlx-nav" data-page="automate">
  <a href="https://fpollock0507-alt.github.io/velox-ai-/" class="vlx-nav-logo">

    <li><a href="https://fpollock0507-alt.github.io/velox-ai-/chatbot.html" data-match="chatbot">Chatbot Demo</a></li>
    <li><a href="https://fpollock0507-alt.github.io/velox-audit/" data-match="audit">Business Audit</a></li>
    <li><a href="https://fpollock0507-alt.github.io/velox-automate/" data-match="automate">Automate</a></li>
  </ul>
  <a href="mailto:Finlay.Veloxai@outlook.com?subject=Book a Demo — Velox AI" class="vlx-nav-links vlx-nav-cta">📅 Book free demo</a>
</nav>
<script>
(function(){
  var page=document.querySelector('.vlx-nav').getAttribute('data-page');
  document.querySelectorAll('.vlx-nav-links a[data-match]').forEach(function(a){
    if(a.getAttribute('data-match')===page)a.classList.add('vlx-active');

<div id="root"></div>

<script>
const PROXY = 'https://velox-proxy.veloxai-account.workers.dev';
const { useState } = React;

const S = {
  bg:'#060810',bg2:'#0c1020',surface:'#111827',surface2:'#1a2035',
  border:'rgba(99,179,255,0.1)',border2:'rgba(99,179,255,0.2)',
  accent:'#3b82f6',accent2:'#8b5cf6',accent3:'#06b6d4',
  text:'#f0f4ff',muted:'#7e8fb0',muted2:'#a8b4cc',
  success:'#34d399',warn:'#fbbf24',danger:'#f87171',
  font:"'Space Grotesk',sans-serif",mono:"'JetBrains Mono',monospace"
};

const WORKFLOWS = [
  {id:'email',name:'Email Sequences',icon:'✉️',desc:'AI writes multi-step follow-up email sequences for any lead list',color:'#3b82f6'},
  {id:'leads',name:'Lead Capture & CRM',icon:'🎯',desc:'Incoming leads auto-qualified by AI, scored and logged with action notes',color:'#8b5cf6'},
  {id:'social',name:'Social Content',icon:'📱',desc:'Generate a week of on-brand social posts for any business in seconds',color:'#06b6d4'},
  {id:'booking',name:'Booking & Reminders',icon:'📅',desc:'AI generates confirmation, reminder and follow-up messages for appointments',color:'#34d399'},
];

const callClaude = async (messages, system, maxTokens=1500) => {
  const res = await fetch(PROXY, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,system,messages})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content[0].text;
};

const inp = (val, set, placeholder='', extra={}) => React.createElement('input', {value:val,onChange:e=>set(e.target.value),placeholder,...extra,style:{width:'100%',background:S.surface2,border:`1px solid ${S.border2}`,borderRadius:8,padding:'9px 12px',color:S.text,fontFamily:S.font,fontSize:13,outline:'none',...(extra.style||{})}});
const ta = (val, set, placeholder='', rows=4) => React.createElement('textarea', {value:val,onChange:e=>set(e.target.value),placeholder,rows,style:{width:'100%',background:S.surface2,border:`1px solid ${S.border2}`,borderRadius:8,padding:'9px 12px',color:S.text,fontFamily:S.font,fontSize:13,outline:'none',resize:'vertical',lineHeight:1.55}});
const sel = (val, set, options) => React.createElement('select', {value:val,onChange:e=>set(e.target.value),style:{width:'100%',background:S.surface2,border:`1px solid ${S.border2}`,borderRadius:8,padding:'9px 12px',color:S.text,fontFamily:S.font,fontSize:13,outline:'none',cursor:'pointer'}}, options.map(o=>React.createElement('option',{key:o},o)));
const lbl = (text) => React.createElement('label', {style:{fontFamily:S.mono,fontSize:10,color:S.muted,textTransform:'uppercase',letterSpacing:'0.08em',display:'block',marginBottom:5}}, text);
const btn = (text, onClick, disabled=false, gradient='135deg,#3b82f6,#8b5cf6') => React.createElement('button', {onClick,disabled,style:{background:disabled?S.surface2:`linear-gradient(${gradient})`,border:'none',borderRadius:9,color:disabled?S.muted:'#fff',fontFamily:S.font,fontWeight:600,fontSize:14,padding:'11px 22px',cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,transition:'all 0.2s'}}, text);
const copyBtn = (text, copied, onCopy) => React.createElement('button', {onClick:onCopy,style:{background:copied?'rgba(52,211,153,0.2)':S.surface,border:`1px solid ${copied?'rgba(52,211,153,0.4)':S.border2}`,borderRadius:6,color:copied?S.success:S.muted2,fontFamily:S.mono,fontSize:11,padding:'3px 10px',cursor:'pointer'}}, copied?'✓':'Copy');

// ── EMAIL WORKFLOW ────────────────────────────────────────────────────────────
function EmailWorkflow() {
  const [bizName,setBizName]=useState('');
  const [industry,setIndustry]=useState('');
  const [service,setService]=useState('');
  const [leads,setLeads]=useState('');
  const [days,setDays]=useState('5');
  const [loading,setLoading]=useState(false);
  const [sequences,setSequences]=useState([]);
  const [copied,setCopied]=useState({});

  const generate = async () => {
    if(!bizName||!leads.trim()) return;
    setLoading(true); setSequences([]);
    const leadList = leads.split('\n').filter(l=>l.trim()).slice(0,8);
    try {
      const results = await Promise.all(leadList.map(async lead => {
        const sys = `You are an expert email copywriter for ${bizName}, a ${industry} business. Write concise, personable, non-salesy emails.`;
        const prompt = `Write a ${days}-email follow-up sequence for lead: "${lead}"\nBusiness: ${bizName} (${industry})\nOffer: ${service||'AI chatbot and automation services'}\nReturn ONLY a JSON array: [{"day":1,"subject":"...","body":"..."},...]\nEach email under 100 words. Build naturally day by day.`;
        const text = await callClaude([{role:'user',content:prompt}], sys, 2000);
        const emails = JSON.parse(text.replace(/```json|```/g,'').trim());
        return {lead:lead.trim(), emails};
      }));
      setSequences(results);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const copy = (key, text) => {
    navigator.clipboard.writeText(text);
    setCopied(p=>({...p,[key]:true}));
    setTimeout(()=>setCopied(p=>({...p,[key]:false})),2000);
  };

  return React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:20}},
    React.createElement('div', {style:{background:S.surface,border:`1px solid ${S.border2}`,borderRadius:14,padding:22}},
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:16}}, 'Configure sequence'),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
        React.createElement('div', null, lbl('Business name'), inp(bizName,setBizName,'e.g. Sydney Plumbing Co')),
        React.createElement('div', null, lbl('Industry'), inp(industry,setIndustry,'e.g. Plumbing, Physiotherapy'))
      ),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:12}},
        React.createElement('div', null, lbl('What you are offering'), inp(service,setService,'e.g. AI chatbot to capture leads 24/7')),
        React.createElement('div', null, lbl('Emails in sequence'), sel(days,setDays,['3','5','7']))
      ),
      React.createElement('div', {style:{marginBottom:14}}, lbl('Lead list (one per line)'), ta(leads,setLeads,'Sarah Mitchell — Bondi Physio\nDave Harris — Castle Hill Plumbing')),
      btn(loading?'✨ Writing sequences...':`✉️ Generate ${days}-email sequences`, generate, loading||!bizName||!leads.trim())
    ),
    ...sequences.map((seq,si) =>
      React.createElement('div', {key:si,style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:14,overflow:'hidden'}},
        React.createElement('div', {style:{padding:'13px 18px',background:S.surface2,borderBottom:`1px solid ${S.border}`,display:'flex',alignItems:'center',gap:8}},
          React.createElement('div', {style:{width:8,height:8,borderRadius:'50%',background:'#3b82f6',boxShadow:'0 0 6px #3b82f6'}}),
          React.createElement('span', {style:{fontSize:14,fontWeight:600,color:S.text}}, seq.lead),
          React.createElement('span', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,marginLeft:'auto'}}, `${seq.emails.length} emails`)
        ),
        React.createElement('div', {style:{padding:18,display:'flex',flexDirection:'column',gap:12}},
          seq.emails.map((email,ei) =>
            React.createElement('div', {key:ei,style:{background:S.surface2,border:`1px solid ${S.border}`,borderRadius:10,padding:14}},
              React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
                React.createElement('div', {style:{display:'flex',alignItems:'center',gap:8}},
                  React.createElement('span', {style:{fontFamily:S.mono,fontSize:10,background:'rgba(59,130,246,0.15)',color:'#60a5fa',border:'1px solid rgba(59,130,246,0.2)',borderRadius:4,padding:'2px 8px'}}, `Day ${email.day}`),
                  React.createElement('span', {style:{fontSize:13,fontWeight:500,color:S.text}}, email.subject)
                ),
                copyBtn(`${si}-${ei}`, copied[`${si}-${ei}`], ()=>copy(`${si}-${ei}`,`Subject: ${email.subject}\n\n${email.body}`))
              ),
              React.createElement('p', {style:{fontSize:13,color:S.muted2,lineHeight:1.7,whiteSpace:'pre-wrap'}}, email.body)
            )
          )
        )
      )
    )
  );
}

// ── LEADS WORKFLOW ────────────────────────────────────────────────────────────
function LeadsWorkflow() {
  const [bizName,setBizName]=useState('');
  const [industry,setIndustry]=useState('');
  const [leadData,setLeadData]=useState('');
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState([]);

  const qualify = async () => {
    if(!leadData.trim()) return;
    setLoading(true); setResults([]);
    const entries = leadData.split('\n\n').filter(e=>e.trim());
    try {
      const qualified = await Promise.all(entries.map(async entry => {
        const sys = `You are a lead qualification specialist for ${bizName||'a business'}, a ${industry||'local'} business.`;
        const prompt = `Qualify this lead and return ONLY JSON:\n"${entry}"\n\n{"name":"...","contact":"...","summary":"2 sentence summary","score":1-10,"intent":"Hot|Warm|Cold","nextAction":"specific next step","flags":["any notes"]}`;
        const text = await callClaude([{role:'user',content:prompt}], sys, 600);
        return {raw:entry,...JSON.parse(text.replace(/```json|```/g,'').trim())};
      }));
      setResults(qualified);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const addToCRM = (lead) => {
    let crm = JSON.parse(localStorage.getItem('velox_crm')||'[]');
    crm.push({id:Date.now().toString(36),name:lead.name||'Unknown',type:industry||'',suburb:'',phone:lead.contact||'',contact:lead.name||'',channel:'inbound',status:lead.intent==='Hot'?'replied':'pitched',value:499,followUp:new Date(Date.now()+24*60*60*1000).toISOString().split('T')[0],notes:[{text:`AI qualified: ${lead.summary} Next: ${lead.nextAction}`,time:new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}],createdAt:new Date().toISOString().split('T')[0]});
    localStorage.setItem('velox_crm',JSON.stringify(crm));
    alert(`${lead.name} added to CRM!`);
  };

  const ic = (intent) => intent==='Hot'?S.danger:intent==='Warm'?S.warn:S.muted;
  const sc = (score) => score>=7?S.success:score>=4?S.warn:S.danger;

  return React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:20}},
    React.createElement('div', {style:{background:S.surface,border:`1px solid ${S.border2}`,borderRadius:14,padding:22}},
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:16}}, 'Qualify inbound leads'),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
        React.createElement('div', null, lbl('Your business name'), inp(bizName,setBizName,'e.g. Peak Physio Sydney')),
        React.createElement('div', null, lbl('Industry'), inp(industry,setIndustry,'e.g. Physiotherapy'))
      ),
      React.createElement('div', {style:{marginBottom:14}}, lbl('Paste lead info (separate multiple leads with blank line)'), ta(leadData,setLeadData,'Name: Sarah Mitchell\nEmail: sarah@gmail.com\nMessage: Looking for physio for a sports injury.\n\nName: John Davis\nPhone: 0412 345 678\nMessage: Need ongoing treatment after knee surgery.',6)),
      btn(loading?'🎯 Qualifying leads...':'🎯 Qualify & score leads', qualify, loading||!leadData.trim(), '135deg,#8b5cf6,#06b6d4')
    ),
    results.length>0 && React.createElement('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}},
      results.map((lead,i) =>
        React.createElement('div', {key:i,style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:13,padding:18,display:'flex',flexDirection:'column',gap:12}},
          React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            React.createElement('div', null,
              React.createElement('p', {style:{fontSize:15,fontWeight:600,color:S.text,marginBottom:3}}, lead.name),
              React.createElement('p', {style:{fontSize:12,color:S.muted2}}, lead.contact)
            ),
            React.createElement('div', {style:{display:'flex',gap:6,alignItems:'center'}},
              React.createElement('span', {style:{fontFamily:S.mono,fontSize:11,padding:'3px 8px',borderRadius:5,background:`${ic(lead.intent)}20`,color:ic(lead.intent),border:`1px solid ${ic(lead.intent)}40`}}, lead.intent),
              React.createElement('div', {style:{width:30,height:30,borderRadius:'50%',background:`${sc(lead.score)}20`,border:`2px solid ${sc(lead.score)}`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:sc(lead.score)}}, lead.score)
            )
          ),
          React.createElement('p', {style:{fontSize:13,color:S.muted2,lineHeight:1.65}}, lead.summary),
          React.createElement('div', {style:{background:S.surface2,borderRadius:8,padding:'9px 12px'}},
            React.createElement('p', {style:{fontFamily:S.mono,fontSize:10,color:S.muted,marginBottom:3}}, 'NEXT ACTION'),
            React.createElement('p', {style:{fontSize:13,color:S.text}}, lead.nextAction)
          ),
          lead.flags?.length>0 && React.createElement('div', {style:{display:'flex',flexWrap:'wrap',gap:5}},
            lead.flags.map((f,fi)=>React.createElement('span',{key:fi,style:{fontFamily:S.mono,fontSize:10,padding:'2px 8px',borderRadius:4,background:'rgba(251,191,36,0.1)',color:S.warn,border:'1px solid rgba(251,191,36,0.2)'}},f))
          ),
          React.createElement('button', {onClick:()=>addToCRM(lead),style:{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',border:'none',borderRadius:8,color:'#fff',fontFamily:S.font,fontWeight:500,fontSize:13,padding:9,cursor:'pointer'}}, '+ Add to CRM')
        )
      )
    )
  );
}

// ── SOCIAL WORKFLOW ───────────────────────────────────────────────────────────
function SocialWorkflow() {
  const [bizName,setBizName]=useState('');
  const [industry,setIndustry]=useState('');
  const [platform,setPlatform]=useState('Instagram');
  const [tone,setTone]=useState('Friendly & casual');
  const [topics,setTopics]=useState('');
  const [count,setCount]=useState('5');
  const [loading,setLoading]=useState(false);
  const [posts,setPosts]=useState([]);
  const [copied,setCopied]=useState({});

  const generate = async () => {
    if(!bizName||!industry) return;
    setLoading(true); setPosts([]);
    const sys = `You are a social media expert for ${bizName}, a ${industry} business in Sydney. Write ${tone.toLowerCase()} ${platform} posts that feel authentic.`;
    const prompt = `Generate ${count} ${platform} posts for ${bizName} (${industry}).\nTone: ${tone}\nTopics: ${topics||'services, tips, behind the scenes, results'}\nReturn ONLY JSON array: [{"type":"Tip|Story|Question|Showcase|Offer","hook":"first line","body":"rest of post","hashtags":["tag1","tag2"],"bestTime":"e.g. Tuesday 7pm"}]`;
    try {
      const text = await callClaude([{role:'user',content:prompt}], sys, 3000);
      setPosts(JSON.parse(text.replace(/```json|```/g,'').trim()));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const tc = {Tip:'#3b82f6',Story:'#8b5cf6',Question:'#06b6d4',Showcase:'#34d399',Offer:'#f59e0b'};
  const copy = (i, post) => {
    navigator.clipboard.writeText(`${post.hook}\n\n${post.body}\n\n${post.hashtags.map(h=>`#${h}`).join(' ')}`);
    setCopied(p=>({...p,[i]:true}));
    setTimeout(()=>setCopied(p=>({...p,[i]:false})),2000);
  };

  return React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:20}},
    React.createElement('div', {style:{background:S.surface,border:`1px solid ${S.border2}`,borderRadius:14,padding:22}},
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:16}}, 'Configure content'),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
        React.createElement('div', null, lbl('Business name'), inp(bizName,setBizName,'e.g. Bondi Physio')),
        React.createElement('div', null, lbl('Industry'), inp(industry,setIndustry,'e.g. Physiotherapy'))
      ),
      React.createElement('div', {style:{marginBottom:12}},
        lbl('Platform'),
        React.createElement('div', {style:{display:'flex',gap:7,flexWrap:'wrap'}},
          ['Instagram','Facebook','LinkedIn','Google Business'].map(p=>React.createElement('button',{key:p,onClick:()=>setPlatform(p),style:{background:platform===p?'rgba(59,130,246,0.15)':S.surface2,border:`1px solid ${platform===p?S.accent:S.border2}`,borderRadius:7,color:platform===p?'#60a5fa':S.muted2,fontFamily:S.mono,fontSize:11,padding:'6px 13px',cursor:'pointer'}},p))
        )
      ),
      React.createElement('div', {style:{marginBottom:12}},
        lbl('Tone'),
        React.createElement('div', {style:{display:'flex',gap:7,flexWrap:'wrap'}},
          ['Professional','Friendly & casual','Witty & fun','Educational','Motivational'].map(t=>React.createElement('button',{key:t,onClick:()=>setTone(t),style:{background:tone===t?'rgba(139,92,246,0.15)':S.surface2,border:`1px solid ${tone===t?S.accent2:S.border2}`,borderRadius:7,color:tone===t?'#a78bfa':S.muted2,fontFamily:S.mono,fontSize:11,padding:'6px 13px',cursor:'pointer'}},t))
        )
      ),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}},
        React.createElement('div', null, lbl('Topics (optional)'), inp(topics,setTopics,'e.g. sports injury recovery, team intro, new hours')),
        React.createElement('div', null, lbl('Number of posts'), sel(count,setCount,['3','5','7','10']))
      ),

// ── BOOKING WORKFLOW ──────────────────────────────────────────────────────────
function BookingWorkflow() {
  const [bizName,setBizName]=useState('');
  const [industry,setIndustry]=useState('');
  const [service,setService]=useState('');
  const [channel,setChannel]=useState('SMS');
  const [appointments,setAppointments]=useState('');
  const [msgTypes,setMsgTypes]=useState(['Confirmation','Reminder (24hr)']);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState([]);
  const [copied,setCopied]=useState({});

  const toggleType = (t) => setMsgTypes(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);

  const generate = async () => {
    if(!appointments.trim()||!bizName) return;
    setLoading(true); setResults([]);
    const apptList = appointments.split('\n').filter(a=>a.trim());
    try {
      const generated = await Promise.all(apptList.map(async appt => {
        const sys = `You are writing ${channel} messages for ${bizName}, a ${industry} business in Sydney. Messages must be friendly, concise and professional.${channel==='SMS'?' Keep under 160 characters.':''}`;
        const messages = await Promise.all(msgTypes.map(async msgType => {
          const prompt = `Write a ${msgType} ${channel} message for appointment: "${appt}"\nBusiness: ${bizName} (${industry}), Service: ${service||'appointment'}\nReturn ONLY JSON: ${channel==='Email'?'{"subject":"...","body":"..."}':'{"body":"..."}'}\nNo markdown, no extra text.`;
          const text = await callClaude([{role:'user',content:prompt}], sys, 400);
          return {type:msgType,...JSON.parse(text.replace(/```json|```/g,'').trim())};
        }));
        return {appointment:appt.trim(), messages};
      }));
      setResults(generated);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const ti = (t) => t.includes('Confirm')?'✅':t.includes('24hr')?'🔔':t.includes('1hr')?'⏰':t.includes('Follow')?'⭐':'📅';
  const copy = (key, text) => {
    navigator.clipboard.writeText(text);
    setCopied(p=>({...p,[key]:true}));
    setTimeout(()=>setCopied(p=>({...p,[key]:false})),2000);
  };

  return React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:20}},
    React.createElement('div', {style:{background:S.surface,border:`1px solid ${S.border2}`,borderRadius:14,padding:22}},
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:16}}, 'Configure messages'),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}},
        React.createElement('div', null, lbl('Business name'), inp(bizName,setBizName,'e.g. Castle Hill Physio')),
        React.createElement('div', null, lbl('Industry'), inp(industry,setIndustry,'e.g. Physiotherapy')),
        React.createElement('div', null, lbl('Service type'), inp(service,setService,'e.g. Sports injury consult'))
      ),
      React.createElement('div', {style:{marginBottom:12}},
        lbl('Channel'),
        React.createElement('div', {style:{display:'flex',gap:7}},
          ['SMS','Email','WhatsApp'].map(c=>React.createElement('button',{key:c,onClick:()=>setChannel(c),style:{background:channel===c?'rgba(52,211,153,0.15)':S.surface2,border:`1px solid ${channel===c?S.success:S.border2}`,borderRadius:7,color:channel===c?S.success:S.muted2,fontFamily:S.mono,fontSize:11,padding:'7px 16px',cursor:'pointer'}},c))
        )
      ),
      React.createElement('div', {style:{marginBottom:12}},
        lbl('Message types'),
        React.createElement('div', {style:{display:'flex',gap:7,flexWrap:'wrap'}},
          ['Confirmation','Reminder (24hr)','Reminder (1hr)','Follow-up','Reschedule request'].map(t=>React.createElement('button',{key:t,onClick:()=>toggleType(t),style:{background:msgTypes.includes(t)?'rgba(59,130,246,0.15)':S.surface2,border:`1px solid ${msgTypes.includes(t)?S.accent:S.border2}`,borderRadius:7,color:msgTypes.includes(t)?'#60a5fa':S.muted2,fontFamily:S.mono,fontSize:11,padding:'6px 12px',cursor:'pointer'}},t))
        )
      ),
      React.createElement('div', {style:{marginBottom:14}}, lbl('Appointments (one per line)'), ta(appointments,setAppointments,'Sarah Mitchell — Monday 14 July at 9am\nDave Harris — Tuesday 15 July at 2:30pm',4)),
      btn(loading?'📅 Writing messages...':`📅 Generate messages for ${appointments.split('\n').filter(a=>a.trim()).length} appointment${appointments.split('\n').filter(a=>a.trim()).length!==1?'s':''}`, generate, loading||!appointments.trim()||!bizName||msgTypes.length===0, '135deg,#34d399,#3b82f6')
    ),
    ...results.map((result,ri) =>
      React.createElement('div', {key:ri,style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:13,overflow:'hidden'}},
        React.createElement('div', {style:{padding:'12px 18px',background:S.surface2,borderBottom:`1px solid ${S.border}`,display:'flex',alignItems:'center',gap:8}},
          React.createElement('div', {style:{width:8,height:8,borderRadius:'50%',background:S.success,boxShadow:`0 0 6px ${S.success}`}}),
          React.createElement('span', {style:{fontSize:14,fontWeight:600,color:S.text}}, result.appointment)
        ),
        React.createElement('div', {style:{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}},
          result.messages.map((msg,mi) =>
            React.createElement('div', {key:mi,style:{background:S.surface2,border:`1px solid ${S.border}`,borderRadius:10,padding:13}},
              React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}},
                React.createElement('div', {style:{display:'flex',alignItems:'center',gap:5}},
                  React.createElement('span', {style:{fontSize:13}}, ti(msg.type)),
                  React.createElement('span', {style:{fontFamily:S.mono,fontSize:10,color:S.muted2}}, msg.type)
                ),
                copyBtn(`${ri}-${mi}`, copied[`${ri}-${mi}`], ()=>copy(`${ri}-${mi}`,msg.subject?`Subject: ${msg.subject}\n\n${msg.body}`:msg.body))
              ),
              msg.subject && React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,marginBottom:5}}, `Subject: ${msg.subject}`),
              React.createElement('p', {style:{fontSize:13,color:S.muted2,lineHeight:1.6}}, msg.body),
              channel==='SMS' && React.createElement('p', {style:{fontFamily:S.mono,fontSize:10,color:msg.body?.length>160?S.danger:S.muted,marginTop:6}}, `${msg.body?.length||0}/160`)
            )
          )
        )
      )
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('home');
  const [clients] = useState([
    {id:'1',name:'Peak Physio Sydney',industry:'Physiotherapy',workflows:['email','booking','social'],mrr:149},
    {id:'2',name:'Castle Hill Plumbing',industry:'Trades',workflows:['email','leads'],mrr:99},

  const WF_MAP = {email:EmailWorkflow, leads:LeadsWorkflow, social:SocialWorkflow, booking:BookingWorkflow};

    // Sub-nav
    React.createElement('div', {style:{background:S.bg2,borderBottom:`1px solid ${S.border}`,padding:'0 28px',display:'flex',alignItems:'center',gap:8,position:'sticky',top:52,zIndex:50,height:44}},
      React.createElement('button', {onClick:()=>setView('home'),style:{background:view==='home'?'rgba(59,130,246,0.12)':S.surface,border:`1px solid ${view==='home'?S.accent:S.border}`,borderRadius:6,color:view==='home'?'#60a5fa':S.muted2,fontFamily:S.mono,fontSize:11,padding:'5px 12px',cursor:'pointer'}}, '🏠 Dashboard'),
      WORKFLOWS.map(wf=>React.createElement('button',{key:wf.id,onClick:()=>setView(wf.id),style:{background:view===wf.id?`${wf.color}18`:S.surface,border:`1px solid ${view===wf.id?wf.color:S.border}`,borderRadius:6,color:view===wf.id?wf.color:S.muted2,fontFamily:S.mono,fontSize:11,padding:'5px 12px',cursor:'pointer'}},`${wf.icon} ${wf.name}`))
    ),

    ActiveWF ? wrap(React.createElement(React.Fragment, null,
      React.createElement('div', {style:{marginBottom:22}},
        React.createElement('h1', {style:{fontSize:24,fontWeight:700,letterSpacing:'-0.02em',marginBottom:5}}, `${activeWf.icon} ${activeWf.name}`),
        React.createElement('p', {style:{fontSize:14,color:S.muted2}}, activeWf.desc)
      ),
      React.createElement(ActiveWF)
    )) :

    wrap(React.createElement(React.Fragment, null,
      // Stats
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}},
        [{label:'Active clients',val:clients.filter(c=>!c.trial).length,color:S.accent},
         {label:'Monthly revenue',val:`$${clients.filter(c=>!c.trial).reduce((a,c)=>a+c.mrr,0)}`,color:S.success},
         {label:'Trial clients',val:clients.filter(c=>c.trial).length,color:S.warn},
         {label:'Total workflows',val:clients.reduce((a,c)=>a+(c.workflows?.length||0),0),color:S.accent2}
        ].map(({label,val,color})=>
          React.createElement('div',{key:label,style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:12,padding:'16px 18px'}},
            React.createElement('div',{style:{fontSize:26,fontWeight:700,color,lineHeight:1}},val),
            React.createElement('div',{style:{fontFamily:S.mono,fontSize:10,color:S.muted,marginTop:4,textTransform:'uppercase',letterSpacing:'0.06em'}},label)
          )
        )
      ),

      // Workflow hub
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:14}}, '// Workflow hub'),
      React.createElement('div', {style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14,marginBottom:28}},
        WORKFLOWS.map(wf=>
          React.createElement('button',{key:wf.id,onClick:()=>setView(wf.id),style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:13,padding:20,cursor:'pointer',textAlign:'left',transition:'all 0.2s'}},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
              React.createElement('div',{style:{width:38,height:38,borderRadius:10,background:`${wf.color}18`,border:`1px solid ${wf.color}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}},wf.icon),
              React.createElement('span',{style:{fontSize:15,fontWeight:600,color:S.text}},wf.name)
            ),
            React.createElement('p',{style:{fontSize:13,color:S.muted2,lineHeight:1.6,marginBottom:8}},wf.desc),
            React.createElement('span',{style:{fontFamily:S.mono,fontSize:11,color:wf.color}},'Open →')
          )
        )
      ),

      // Clients
      React.createElement('p', {style:{fontFamily:S.mono,fontSize:11,color:S.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:14}}, '// Client accounts'),
      React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:10}},
        clients.map(c=>
          React.createElement('div',{key:c.id,style:{background:S.surface,border:`1px solid ${S.border}`,borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:14}},
            React.createElement('div',{style:{width:38,height:38,borderRadius:10,background:'rgba(59,130,246,0.1)',border:`1px solid ${S.border2}`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:15,color:S.accent}},c.name[0]),
            React.createElement('div',{style:{flex:1}},
              React.createElement('p',{style:{fontSize:14,fontWeight:600,marginBottom:2}},c.name),
              React.createElement('p',{style:{fontSize:12,color:S.muted2}},`${c.industry} · ${c.workflows?.length||0} workflows`)
            ),
            React.createElement('div',{style:{display:'flex',gap:5}},
              c.workflows?.map(wid=>React.createElement('span',{key:wid,style:{fontFamily:S.mono,fontSize:10,padding:'2px 7px',borderRadius:4,background:`${WORKFLOWS.find(w=>w.id===wid)?.color}18`,color:WORKFLOWS.find(w=>w.id===wid)?.color}},WORKFLOWS.find(w=>w.id===wid)?.icon))
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('p',{style:{fontSize:14,fontWeight:700,color:c.trial?S.warn:S.success}},c.trial?'Trial':`$${c.mrr}/mo`),
              React.createElement('p',{style:{fontFamily:S.mono,fontSize:10,color:S.muted}},c.trial?'Free':'Active')
            )
          )
        )
      )
    ))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
